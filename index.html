<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHub</title>
    
    <!-- IMMEDIATE Error Suppression - Inline for fastest execution -->
    <script>
    // Ultra-fast error suppressor - executes before ANYTHING else
    (function(){
        'use strict';
        // Pattern matcher
        const s=(m)=>{
            if(!m)return false;
            const str=String(m);
            // Check exact patterns first (case-sensitive)
            if(str.includes('IframeMessageAbortError')||
               str.includes('eS.setupMessageChannel')||
               str.includes('a.cleanup')||
               str.includes('o.cleanup')||
               str.includes('e.onload'))return true;
            // Check lower case patterns
            const lc=str.toLowerCase();
            return lc.includes('iframemessageaborterror')||
                   lc.includes('message port')||
                   lc.includes('figma.com')||
                   lc.includes('message aborted')||
                   lc.includes('webpack-artifacts')||
                   lc.includes('message channel')||
                   lc.includes('aborted');
        };
        // Override console methods
        ['error','warn'].forEach(m=>{
            const o=console[m];
            console[m]=function(...a){
                if(a.some(x=>s(x)))return;
                o.apply(console,a);
            };
        });
        // Override window.onerror
        const oe=window.onerror;
        window.onerror=function(msg,src,ln,col,err){
            if(s(msg)||s(err&&err.message)||s(err&&err.stack))return true;
            return oe?oe.apply(this,arguments):false;
        };
        // Override addEventListener for 'error'
        const ael=EventTarget.prototype.addEventListener;
        EventTarget.prototype.addEventListener=function(t,l,o){
            if(t==='error'){
                const nl=function(e){
                    if(e&&(s(e.message)||s(e.error&&e.error.message)||s(e.reason)))return;
                    return l.apply(this,arguments);
                };
                return ael.call(this,t,nl,o);
            }
            return ael.call(this,t,l,o);
        };
        // Override Promise rejection
        window.addEventListener('unhandledrejection',function(e){
            if(s(e.reason)||s(e.reason&&e.reason.message))e.preventDefault();
        },true);
    })();
    </script>
    
    <meta http-equiv="refresh" content="0; url=/public/index.html">
    <script>window.location.href='/public/index.html';</script>
</head>
<body style="margin:0;padding:0;background:#6366f1;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div style="text-align:center;">
        <div style="width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>
        <p>Loading JobHub... <a href="/public/index.html" style="color:#fff;">Click here</a> if not redirected.</p>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
</body>
</html>
