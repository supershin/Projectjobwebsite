<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHub</title>
    <!-- Error Suppressor -->
    <script>
        (function(){const e=console.error;console.error=function(...r){const o=r.join(' ').toString();if(['iframemessageaborterror','message port was destroyed','message aborted','webpack-artifacts'].some(s=>o.toLowerCase().includes(s)))return;e.apply(console,r)};window.addEventListener('error',function(r){const o=(r.message||'').toLowerCase();if(o.includes('iframemessageaborterror')||o.includes('message port was destroyed')){r.preventDefault();return false}},true)})();
    </script>
    <meta http-equiv="refresh" content="0; url=/public/index.html">
    <script>window.location.href='/public/index.html';</script>
</head>
<body style="margin:0;padding:0;background:#6366f1;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div style="text-align:center;">
        <div style="width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>
        <p>Loading JobHub... <a href="/public/index.html" style="color:#fff;">Click here</a> if not redirected.</p>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
</body>
</html>
