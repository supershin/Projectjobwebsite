                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                    <div class="d-flex align-items-center justify-content-between mb-4 pt-4">
                        <a href="dashboard.html?mode=admin&view=internships" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>กลับ</a>
                        <h3 class="mb-0 fw-bold"><i class="bi bi-pencil me-2"></i>แก้ไขตำแหน่งฝึกงาน</h3>
                        <div style="width: 100px;"></div>
                    </div>

                    <div id="loadingContainer" class="text-center py-5">
                        <div class="spinner-border text-primary"></div>
                        <p class="mt-3">กำลังโหลดข้อมูล...</p>
                    </div>

                    <form id="editInternshipForm" style="display: none;">
                        <input type="hidden" name="internshipId">
                        
                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-white"><h6 class="mb-0 fw-bold">ข้อมูลพื้นฐาน</h6></div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label fw-semibold">Internship ID</label><input type="text" class="form-control" name="internshipIdDisplay" disabled></div>
                                    <div class="col-md-6"><label class="form-label fw-semibold">Title *</label><input type="text" class="form-control" name="title" required></div>
                                    <div class="col-12"><label class="form-label fw-semibold">Description *</label><textarea class="form-control" name="description" rows="3" required></textarea></div>
                                    <div class="col-md-4"><label class="form-label fw-semibold">Department *</label><input type="text" class="form-control" name="department" required></div>
                                    <div class="col-md-4"><label class="form-label fw-semibold">Location *</label>
                                        <select class="form-select" name="location" required>
                                            <option value="">-- เลือก --</option>
                                            <option value="Bangkok">Bangkok</option>
                                            <option value="Phuket">Phuket</option>
                                            <option value="Chiang Mai">Chiang Mai</option>
                                            <option value="Pattaya">Pattaya</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4"><label class="form-label fw-semibold">Duration *</label><input type="text" class="form-control" name="duration" required></div>
                                    <div class="col-md-6"><label class="form-label fw-semibold">Positions *</label><input type="number" class="form-control" name="positions" required></div>
                                    <div class="col-md-6"><label class="form-label fw-semibold">Start Date *</label><input type="date" class="form-control" name="startDate" required></div>
                                </div>
                            </div>
                        </div>

                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-white"><h6 class="mb-0 fw-bold">Requirements</h6></div>
                            <div class="card-body">
                                <label class="form-label fw-semibold">Requirements (แยกแต่ละบรรทัด)</label>
                                <textarea class="form-control" name="requirements" rows="5"></textarea>
                            </div>
                        </div>

                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-white"><h6 class="mb-0 fw-bold">Benefits</h6></div>
                            <div class="card-body">
                                <label class="form-label fw-semibold">Benefits (แยกแต่ละบรรทัด)</label>
                                <textarea class="form-control" name="benefits" rows="5"></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mb-4">
                            <button type="submit" class="btn btn-success btn-lg px-5"><i class="bi bi-check-circle me-2"></i>บันทึก</button>
                            <a href="dashboard.html?mode=admin&view=internships" class="btn btn-outline-secondary btn-lg px-5">ยกเลิก</a>
                        </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let currentInternship = null;
    $(document).ready(function() { loadInternshipData(); });
    
    async function loadInternshipData() {
        const urlParams = new URLSearchParams(window.location.search);
        const internshipId = urlParams.get('id');
        if (!internshipId) { alert('ไม่พบ Internship ID'); window.location.href = 'dashboard.html?mode=admin&view=internships'; return; }
        
        try {
            const response = await fetch('./data/internships.json');
            const internships = await response.json();
            currentInternship = internships.find(i => i.internshipId === internshipId);
            if (!currentInternship) { alert('ไม่พบข้อมูลตำแหน่งฝึกงาน'); window.location.href = 'dashboard.html?mode=admin&view=internships'; return; }
            
            $('[name="internshipId"]').val(currentInternship.internshipId);
            $('[name="internshipIdDisplay"]').val(currentInternship.internshipId);
            $('[name="title"]').val(currentInternship.title);
            $('[name="description"]').val(currentInternship.description);
            $('[name="department"]').val(currentInternship.department);
            $('[name="location"]').val(currentInternship.location);
            $('[name="duration"]').val(currentInternship.duration);
            $('[name="positions"]').val(currentInternship.positions);
            $('[name="startDate"]').val(currentInternship.startDate);
            $('[name="requirements"]').val(currentInternship.requirements ? currentInternship.requirements.join('\n') : '');
            $('[name="benefits"]').val(currentInternship.benefits ? currentInternship.benefits.join('\n') : '');
            
            $('#loadingContainer').hide();
            $('#editInternshipForm').show();
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
        }
    }
    
    $('#editInternshipForm').on('submit', function(e) {
        e.preventDefault();
        const updatedData = {
            internshipId: $('[name="internshipId"]').val(),
            title: $('[name="title"]').val(),
            description: $('[name="description"]').val(),
            department: $('[name="department"]').val(),
            location: $('[name="location"]').val(),
            duration: $('[name="duration"]').val(),
            positions: parseInt($('[name="positions"]').val()),
            startDate: $('[name="startDate"]').val(),
            requirements: $('[name="requirements"]').val().split('\n').filter(r => r.trim()),
            benefits: $('[name="benefits"]').val().split('\n').filter(b => b.trim())
        };
        console.log('Updated Internship:', updatedData);
        alert('✅ บันทึกสำเร็จ!');
        window.location.href = 'dashboard.html?mode=admin&view=internships';
    });
    </script>
