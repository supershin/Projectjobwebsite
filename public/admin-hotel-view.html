<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดูรายละเอียดโรงแรม - Admin - JobCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <link href="./css/dashboard.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <img src="https://supershin.github.io/Project.Job/logo/logo.jpg" alt="JobCrew Logo" class="navbar-brand-logo"> JobCrew
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=0D4C92&color=fff" alt="Admin" class="rounded-circle me-2" width="32" height="32">
                            <span>Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="dashboard.html?mode=admin"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="index.html"><i class="bi bi-box-arrow-right"></i> ออกจากระบบ</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                    <div class="position-sticky pt-3">
                        <ul class="nav flex-column">
                            <li class="nav-item">
                                <a class="nav-link" href="dashboard.html?mode=admin&view=overview">
                                    <i class="bi bi-speedometer2"></i> ภาพรวม
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="dashboard.html?mode=admin&view=users">
                                    <i class="bi bi-people"></i> จัดการผู้ใช้
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="dashboard.html?mode=admin&view=jobs">
                                    <i class="bi bi-briefcase"></i> จัดการงาน
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" href="dashboard.html?mode=admin&view=hotels">
                                    <i class="bi bi-building-fill-add"></i> จัดการโรงแรม
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="dashboard.html?mode=admin&view=schools">
                                    <i class="bi bi-mortarboard-fill"></i> จัดการสถาบัน
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="dashboard.html?mode=admin&view=internships">
                                    <i class="bi bi-briefcase"></i> จัดการฝึกงาน
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="dashboard.html?mode=admin&view=articles">
                                    <i class="bi bi-newspaper"></i> จัดการบทความ
                                </a>
                            </li>
                        </ul>
                    </div>
                </nav>

                <!-- Main Content -->
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                    <div class="d-flex align-items-center justify-content-between mb-4 pt-4">
                        <a href="dashboard.html?mode=admin&view=hotels" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>กลับ
                        </a>
                        <h3 class="mb-0 fw-bold"><i class="bi bi-building me-2"></i>รายละเอียดโรงแรม</h3>
                        <button class="btn btn-success" onclick="editHotel()">
                            <i class="bi bi-pencil me-2"></i>แก้ไข
                        </button>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-body p-4">
                            <div id="hotelDetailContent">
                                <div class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status"></div>
                                    <p class="mt-3">กำลังโหลดข้อมูล...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let currentHotel = null;
    
    $(document).ready(function() {
        loadHotelDetail();
    });
    
    async function loadHotelDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const hotelId = urlParams.get('id');
        
        if (!hotelId) {
            alert('ไม่พบ Hotel ID');
            window.location.href = 'dashboard.html?mode=admin&view=hotels';
            return;
        }
        
        try {
            const response = await fetch('./data/hotels.json');
            const hotels = await response.json();
            currentHotel = hotels.find(h => h.hotelId === hotelId);
            
            if (!currentHotel) {
                alert('ไม่พบข้อมูลโรงแรม');
                window.location.href = 'dashboard.html?mode=admin&view=hotels';
                return;
            }
            
            displayHotelDetail();
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
        }
    }
    
    function displayHotelDetail() {
        const html = `
            <div class="row mb-4">
                <div class="col-12">
                    <img src="${currentHotel.heroImage}" alt="${currentHotel.hotelName}" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px;">
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-8">
                    <h2 class="fw-bold mb-2">${currentHotel.hotelName}</h2>
                    <p class="lead">${currentHotel.description}</p>
                    <div class="mb-3">
                        <span class="badge bg-primary me-2">${currentHotel.category}</span>
                        <span class="badge bg-info">${currentHotel.location}</span>
                        ${currentHotel.verified ? '<span class="badge bg-success">Verified</span>' : ''}
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3">ข้อมูลพื้นฐาน</h6>
                            <p class="mb-2"><strong>Hotel ID:</strong><br><code>${currentHotel.hotelId}</code></p>
                            <p class="mb-2"><strong>Rating:</strong> ${currentHotel.rating}/5</p>
                            <p class="mb-0"><strong>Employees:</strong> ${currentHotel.employees || '-'}</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h6 class="fw-bold mb-0">ติดต่อ</h6>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>Address:</strong><br>${currentHotel.address}</p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>Email:</strong> ${currentHotel.contactEmail}</p>
                            <p><strong>Phone:</strong> ${currentHotel.contactPhone}</p>
                            <p><strong>Website:</strong> <a href="${currentHotel.website}" target="_blank">${currentHotel.website}</a></p>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        $('#hotelDetailContent').html(html);
    }
    
    function editHotel() {
        window.location.href = `admin-hotel-edit.html?id=${currentHotel.hotelId}`;
    }
    </script>
</body>
</html>
