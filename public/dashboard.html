<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="dashboard.title">Dashboard - JobHub</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="./css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-briefcase-fill"></i> JobHub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <!-- Language Switcher -->
                    <li class="nav-item dropdown me-2">
                        <a class="nav-link dropdown-toggle" href="#" id="languageDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-translate"></i>
                            <span id="currentLanguage">TH</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item language-option" href="#" data-lang="th">
                                <i class="bi bi-check-circle-fill text-success me-2"></i> ไทย
                            </a></li>
                            <li><a class="dropdown-item language-option" href="#" data-lang="en">
                                <i class="bi bi-circle me-2"></i> English
                            </a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <img src="https://ui-avatars.com/api/?name=User&background=random" alt="User" class="rounded-circle me-2" width="32" height="32" id="userAvatar">
                            <span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="dashboard.html"><i class="bi bi-speedometer2"></i> <span data-i18n="nav.dashboard">Dashboard</span></a></li>
                            <li><a class="dropdown-item" href="dashboard.html?view=profile"><i class="bi bi-person"></i> <span data-i18n="dashboard.profile">โปรไฟล์</span></a></li>
                            <li><a class="dropdown-item" href="dashboard.html?view=settings"><i class="bi bi-gear"></i> <span data-i18n="dashboard.settings">ตั้งค่า</span></a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> <span data-i18n="nav.logout">ออกจากระบบ</span></a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                    <div class="position-sticky pt-3">
                        <ul class="nav flex-column" id="dashboardMenu">
                            <!-- Menu will be populated by JavaScript based on user role -->
                        </ul>
                    </div>
                </nav>

                <!-- Main Content -->
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                    <div class="pt-3 pb-2 mb-3">
                        <h2 class="fw-bold" id="dashboardTitle">Dashboard</h2>
                    </div>

                    <!-- Dashboard Content Area -->
                    <div id="dashboardContent">
                        <!-- Content will be loaded by JavaScript based on user role -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom JS -->
    <script src="./js/translations.js"></script>
    <script src="./js/language.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/dashboard-improved.js"></script>
    <script src="./js/dashboard-employer.js"></script>
    <script src="./js/dashboard-admin.js"></script>
    <script src="./js/dashboard-functions.js"></script>
</body>
</html>
