<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขสถาบัน - Admin - JobCrew</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="d-flex align-items-center justify-content-between mb-4 pt-4">
                    <div>
                        <a href="dashboard.html?mode=admin&view=schools" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>กลับ
                        </a>
                    </div>
                    <h3 class="mb-0 fw-bold">
                        <i class="bi bi-pencil me-2"></i>
                        แก้ไขสถาบันการศึกษา
                    </h3>
                    <div style="width: 100px;"></div>
                </div>

                <div id="loadingContainer" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3">กำลังโหลดข้อมูล...</p>
                </div>

                <form id="editSchoolForm" style="display: none;">
                    <input type="hidden" name="schoolId">
                    
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-info-circle me-2"></i>ข้อมูลพื้นฐาน</h6>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">School ID <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="schoolIdDisplay" disabled>
                                    <small class="text-muted">ไม่สามารถเปลี่ยนแปลงได้</small>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Short Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="shortName" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">School Name (Full) <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="schoolName" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Description <span class="text-danger">*</span></label>
                                    <textarea class="form-control" name="description" rows="3" required></textarea>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Type <span class="text-danger">*</span></label>
                                    <select class="form-select" name="type" required>
                                        <option value="">-- เลือกประเภท --</option>
                                        <option value="University">University</option>
                                        <option value="College">College</option>
                                        <option value="Training Center">Training Center</option>
                                        <option value="Vocational School">Vocational School</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Location <span class="text-danger">*</span></label>
                                    <select class="form-select" name="location" required>
                                        <option value="">-- เลือกสถานที่ --</option>
                                        <option value="Bangkok">Bangkok</option>
                                        <option value="Phuket">Phuket</option>
                                        <option value="Chiang Mai">Chiang Mai</option>
                                        <option value="Pattaya">Pattaya</option>
                                        <option value="Samui">Samui</option>
                                        <option value="Hua Hin">Hua Hin</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Established Year</label>
                                    <input type="number" class="form-control" name="establishedYear">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-image me-2"></i>รูปภาพ</h6>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Logo URL <span class="text-danger">*</span></label>
                                    <input type="url" class="form-control" name="logo" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label fw-semibold">Cover Image URL <span class="text-danger">*</span></label>
                                    <input type="url" class="form-control" name="coverImage" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-geo-alt me-2"></i>ที่อยู่และการติดต่อ</h6>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Address <span class="text-danger">*</span></label>
                                    <textarea class="form-control" name="address" rows="2" required></textarea>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Website <span class="text-danger">*</span></label>
                                    <input type="url" class="form-control" name="website" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control" name="contactEmail" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Phone <span class="text-danger">*</span></label>
                                    <input type="tel" class="form-control" name="contactPhone" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-book me-2"></i>หลักสูตร</h6>
                            <button type="button" class="btn btn-sm btn-primary" onclick="addProgramField()">
                                <i class="bi bi-plus-circle me-1"></i>เพิ่มหลักสูตร
                            </button>
                        </div>
                        <div class="card-body">
                            <div id="programsContainer">
                                <!-- Programs will be loaded here -->
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-award me-2"></i>ข้อมูลเพิ่มเติม</h6>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Accreditations (คั่นด้วย comma)</label>
                                    <textarea class="form-control" name="accreditations" rows="2"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Partnerships (คั่นด้วย comma)</label>
                                    <textarea class="form-control" name="partnerships" rows="2"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Job Placement Rate</label>
                                    <input type="text" class="form-control" name="jobPlacementRate">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Tuition Fee</label>
                                    <input type="text" class="form-control" name="tuitionFee">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h6 class="mb-0 fw-bold"><i class="bi bi-gear me-2"></i>สถานะ</h6>
                        </div>
                        <div class="card-body">
                            <div class="form-check form-switch mb-2">
                                <input class="form-check-input" type="checkbox" name="verified" id="verifiedCheck">
                                <label class="form-check-label fw-semibold" for="verifiedCheck">
                                    <i class="bi bi-patch-check-fill text-success me-1"></i>Verified
                                </label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="featured" id="featuredCheck">
                                <label class="form-check-label fw-semibold" for="featuredCheck">
                                    <i class="bi bi-star-fill text-warning me-1"></i>Featured
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 mb-4">
                        <button type="submit" class="btn btn-success btn-lg px-5">
                            <i class="bi bi-check-circle me-2"></i>บันทึกการแก้ไข
                        </button>
                        <a href="dashboard.html?mode=admin&view=schools" class="btn btn-outline-secondary btn-lg px-5">
                            ยกเลิก
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
    let programCount = 0;
    let currentSchool = null;
    
    $(document).ready(function() {
        loadSchoolData();
    });
    
    async function loadSchoolData() {
        const urlParams = new URLSearchParams(window.location.search);
        const schoolId = urlParams.get('id');
        
        if (!schoolId) {
            alert('ไม่พบ School ID');
            window.location.href = 'dashboard.html?mode=admin&view=schools';
            return;
        }
        
        try {
            const response = await fetch('./data/hospitality-schools.json');
            const schools = await response.json();
            currentSchool = schools.find(s => s.schoolId === schoolId);
            
            if (!currentSchool) {
                alert('ไม่พบข้อมูลสถาบัน');
                window.location.href = 'dashboard.html?mode=admin&view=schools';
                return;
            }
            
            populateForm();
            $('#loadingContainer').hide();
            $('#editSchoolForm').show();
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
        }
    }
    
    function populateForm() {
        // Basic info
        $('[name="schoolId"]').val(currentSchool.schoolId);
        $('[name="schoolIdDisplay"]').val(currentSchool.schoolId);
        $('[name="schoolName"]').val(currentSchool.schoolName);
        $('[name="shortName"]').val(currentSchool.shortName);
        $('[name="description"]').val(currentSchool.description);
        $('[name="type"]').val(currentSchool.type);
        $('[name="location"]').val(currentSchool.location);
        $('[name="establishedYear"]').val(currentSchool.establishedYear || '');
        
        // Images
        $('[name="logo"]').val(currentSchool.logo);
        $('[name="coverImage"]').val(currentSchool.coverImage);
        
        // Contact
        $('[name="address"]').val(currentSchool.address);
        $('[name="website"]').val(currentSchool.website);
        $('[name="contactEmail"]').val(currentSchool.contactEmail);
        $('[name="contactPhone"]').val(currentSchool.contactPhone);
        
        // Programs
        currentSchool.programs.forEach(program => {
            addProgramField(program);
        });
        
        // Additional
        if (currentSchool.accreditations) {
            $('[name="accreditations"]').val(currentSchool.accreditations.join(', '));
        }
        if (currentSchool.partnerships) {
            $('[name="partnerships"]').val(currentSchool.partnerships.join(', '));
        }
        $('[name="jobPlacementRate"]').val(currentSchool.jobPlacementRate || '');
        $('[name="tuitionFee"]').val(currentSchool.tuitionFee || '');
        
        // Status
        $('[name="verified"]').prop('checked', currentSchool.verified);
        $('[name="featured"]').prop('checked', currentSchool.featured);
    }
    
    function addProgramField(program = null) {
        programCount++;
        const html = `
            <div class="program-item border rounded p-3 mb-3" id="program${programCount}">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="mb-0 fw-bold">หลักสูตร #${programCount}</h6>
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeProgramField(${programCount})">
                        <i class="bi bi-trash"></i> ลบ
                    </button>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">ชื่อหลักสูตร <span class="text-danger">*</span></label>
                        <input type="text" class="form-control program-name" required value="${program?.name || ''}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">ระดับ <span class="text-danger">*</span></label>
                        <select class="form-select program-degree" required>
                            <option value="">-- เลือก --</option>
                            <option value="Bachelor" ${program?.degree === 'Bachelor' ? 'selected' : ''}>Bachelor</option>
                            <option value="Master" ${program?.degree === 'Master' ? 'selected' : ''}>Master</option>
                            <option value="Diploma" ${program?.degree === 'Diploma' ? 'selected' : ''}>Diploma</option>
                            <option value="Certificate" ${program?.degree === 'Certificate' ? 'selected' : ''}>Certificate</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">ระยะเวลา <span class="text-danger">*</span></label>
                        <input type="text" class="form-control program-duration" required value="${program?.duration || ''}">
                    </div>
                </div>
            </div>
        `;
        $('#programsContainer').append(html);
    }
    
    function removeProgramField(id) {
        if ($('.program-item').length > 1) {
            $(`#program${id}`).remove();
        } else {
            alert('ต้องมีอย่างน้อย 1 หลักสูตร');
        }
    }
    
    $('#editSchoolForm').on('submit', function(e) {
        e.preventDefault();
        
        // Collect programs
        const programs = [];
        $('.program-item').each(function() {
            const name = $(this).find('.program-name').val();
            const degree = $(this).find('.program-degree').val();
            const duration = $(this).find('.program-duration').val();
            
            if (name && degree && duration) {
                programs.push({ name, degree, duration });
            }
        });
        
        if (programs.length === 0) {
            alert('กรุณาเพิ่มหลักสูตรอย่างน้อย 1 หลักสูตร');
            return;
        }
        
        // Collect updated data
        const updatedData = {
            schoolId: $('[name="schoolId"]').val(),
            schoolName: $('[name="schoolName"]').val(),
            shortName: $('[name="shortName"]').val(),
            description: $('[name="description"]').val(),
            type: $('[name="type"]').val(),
            location: $('[name="location"]').val(),
            establishedYear: parseInt($('[name="establishedYear"]').val()) || null,
            logo: $('[name="logo"]').val(),
            coverImage: $('[name="coverImage"]').val(),
            address: $('[name="address"]').val(),
            website: $('[name="website"]').val(),
            contactEmail: $('[name="contactEmail"]').val(),
            contactPhone: $('[name="contactPhone"]').val(),
            programs: programs,
            accreditations: $('[name="accreditations"]').val() ? $('[name="accreditations"]').val().split(',').map(s => s.trim()) : [],
            partnerships: $('[name="partnerships"]').val() ? $('[name="partnerships"]').val().split(',').map(s => s.trim()) : [],
            jobPlacementRate: $('[name="jobPlacementRate"]').val() || null,
            tuitionFee: $('[name="tuitionFee"]').val() || null,
            verified: $('[name="verified"]').is(':checked'),
            featured: $('[name="featured"]').is(':checked')
        };
        
        console.log('Updated School Data:', updatedData);
        
        // In production, send to API
        // await fetch(`/api/schools/${schoolId}`, { method: 'PUT', body: JSON.stringify(updatedData) });
        
        alert('✅ บันทึกการแก้ไขสำเร็จ!\n\n(ในการใช้งานจริงจะส่งข้อมูลไป Backend API)');
        
        // Redirect back
        window.location.href = 'dashboard.html?mode=admin&view=schools';
    });
    </script>
</body>
</html>
