    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let currentInternship = null;
    $(document).ready(function() { loadInternshipDetail(); });
    
    async function loadInternshipDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const internshipId = urlParams.get('id');
        if (!internshipId) { alert('ไม่พบ Internship ID'); window.location.href = 'dashboard.html?mode=admin&view=internships'; return; }
        
        try {
            const response = await fetch('./data/internships.json');
            const internships = await response.json();
            currentInternship = internships.find(i => i.internshipId === internshipId);
            if (!currentInternship) { alert('ไม่พบข้อมูลตำแหน่งฝึกงาน'); window.location.href = 'dashboard.html?mode=admin&view=internships'; return; }
            
            const html = `
                <div class="row mb-4">
                    <div class="col-md-8">
                        <h2 class="fw-bold mb-2">${currentInternship.title}</h2>
                        <h5 class="text-muted mb-3">${currentInternship.department}</h5>
                        <p class="lead">${currentInternship.description}</p>
                        <div class="mb-3">
                            <span class="badge bg-primary me-2">${currentInternship.location}</span>
                            <span class="badge bg-info">${currentInternship.duration}</span>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-light">
                            <div class="card-body">
                                <h6 class="fw-bold mb-3">ข้อมูลพื้นฐาน</h6>
                                <p class="mb-2"><strong>ID:</strong><br><code>${currentInternship.internshipId}</code></p>
                                <p class="mb-2"><strong>Positions:</strong> ${currentInternship.positions}</p>
                                <p class="mb-0"><strong>Start Date:</strong> ${currentInternship.startDate}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header bg-white"><h6 class="fw-bold mb-0">Requirements</h6></div>
                    <div class="card-body">
                        <ul>${currentInternship.requirements.map(r => `<li>${r}</li>`).join('')}</ul>
                    </div>
                </div>

                ${currentInternship.benefits ? `
                <div class="card mb-4">
                    <div class="card-header bg-white"><h6 class="fw-bold mb-0">Benefits</h6></div>
                    <div class="card-body">
                        <ul>${currentInternship.benefits.map(b => `<li>${b}</li>`).join('')}</ul>
                    </div>
                </div>
                ` : ''}
            `;
            $('#internshipDetailContent').html(html);
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
        }
    }
    
    function editInternship() {
        window.location.href = `admin-internship-edit.html?id=${currentInternship.internshipId}`;
    }
    </script>
