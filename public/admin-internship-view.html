<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดูรายละเอียดตำแหน่งฝึกงาน - Admin - JobCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <a href="dashboard.html?mode=admin&view=internships" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>กลับ
            </a>
            <h3 class="mb-0 fw-bold"><i class="bi bi-briefcase me-2"></i>รายละเอียดตำแหน่งฝึกงาน</h3>
            <button class="btn btn-success" onclick="editInternship()">
                <i class="bi bi-pencil me-2"></i>แก้ไข
            </button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div id="internshipDetailContent">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3">กำลังโหลดข้อมูล...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let currentInternship = null;
    
    $(document).ready(function() {
        loadInternshipDetail();
    });
    
    async function loadInternshipDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const internshipId = urlParams.get('id');
        
        if (!internshipId) {
            alert('ไม่พบ Internship ID');
            window.location.href = 'dashboard.html?mode=admin&view=internships';
            return;
        }
        
        try {
            const response = await fetch('./data/internships.json');
            const internships = await response.json();
            currentInternship = internships.find(i => i.internshipId === internshipId);
            
            if (!currentInternship) {
                alert('ไม่พบข้อมูลตำแหน่งฝึกงาน');
                window.location.href = 'dashboard.html?mode=admin&view=internships';
                return;
            }
            
            displayInternshipDetail();
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
        }
    }
    
    function displayInternshipDetail() {
        const html = `
            <div class="row mb-4">
                <div class="col-md-8">
                    <h2 class="fw-bold mb-3">${currentInternship.positionTitle}</h2>
                    <div class="mb-3">
                        <span class="badge bg-primary me-2">${currentInternship.department}</span>
                        <span class="badge bg-info">${currentInternship.location}</span>
                    </div>
                    <p class="lead">${currentInternship.description}</p>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3"><i class="bi bi-info-circle me-2"></i>ข้อมูลพื้นฐาน</h6>
                            <p class="mb-2"><strong>ID:</strong><br><code>${currentInternship.internshipId}</code></p>
                            <p class="mb-2"><strong>Duration:</strong><br>${currentInternship.duration}</p>
                            <p class="mb-0"><strong>Spots:</strong><br>${currentInternship.availableSpots} ตำแหน่ง</p>
                        </div>
                    </div>
                </div>
            </div>

            ${currentInternship.hotelInfo ? `
                <div class="card mb-4">
                    <div class="card-header bg-white">
                        <h6 class="fw-bold mb-0"><i class="bi bi-building me-2"></i>ข้อมูลโรงแรม</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <img src="${currentInternship.hotelInfo.logo}" alt="${currentInternship.hotelInfo.name}" style="width: 80px; height: 80px; object-fit: contain; border-radius: 8px;">
                            <div>
                                <h5 class="fw-bold mb-1">${currentInternship.hotelInfo.name}</h5>
                                <p class="text-muted mb-0"><i class="bi bi-geo-alt-fill me-1"></i>${currentInternship.hotelInfo.location}</p>
                            </div>
                        </div>
                    </div>
                </div>
            ` : ''}

            ${currentInternship.responsibilities && currentInternship.responsibilities.length > 0 ? `
                <div class="card mb-4">
                    <div class="card-header bg-white">
                        <h6 class="fw-bold mb-0"><i class="bi bi-list-check me-2"></i>หน้าที่ความรับผิดชอบ</h6>
                    </div>
                    <div class="card-body">
                        <ul class="mb-0">
                            ${currentInternship.responsibilities.map(r => `<li>${r}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            ` : ''}

            ${currentInternship.requirements && currentInternship.requirements.length > 0 ? `
                <div class="card mb-4">
                    <div class="card-header bg-white">
                        <h6 class="fw-bold mb-0"><i class="bi bi-check-square me-2"></i>คุณสมบัติ</h6>
                    </div>
                    <div class="card-body">
                        <ul class="mb-0">
                            ${currentInternship.requirements.map(r => `<li>${r}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            ` : ''}

            ${currentInternship.benefits && currentInternship.benefits.length > 0 ? `
                <div class="card mb-4">
                    <div class="card-header bg-white">
                        <h6 class="fw-bold mb-0"><i class="bi bi-gift me-2"></i>สิทธิประโยชน์</h6>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            ${currentInternship.benefits.map(b => `
                                <div class="col-md-6 mb-2">
                                    <i class="bi bi-check-circle-fill text-success me-2"></i>${b}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            ` : ''}

            <div class="row">
                <div class="col-md-3 mb-3">
                    <div class="card ${currentInternship.isPaid ? 'bg-success' : 'bg-secondary'} text-white h-100">
                        <div class="card-body">
                            <h6 class="fw-bold mb-2"><i class="bi bi-credit-card me-2"></i>ค่าตอบแทน</h6>
                            <p class="mb-0">${currentInternship.isPaid ? 'มีค่าตอบแทน' : 'ไม่มีค่าตอบแทน'}</p>
                            ${currentInternship.stipend ? `<h5 class="mb-0 mt-2">${currentInternship.stipend}</h5>` : ''}
                        </div>
                    </div>
                </div>
                ${currentInternship.applicationDeadline ? `
                    <div class="col-md-3 mb-3">
                        <div class="card bg-warning text-white h-100">
                            <div class="card-body">
                                <h6 class="fw-bold mb-2"><i class="bi bi-calendar-x me-2"></i>ปิดรับสมัคร</h6>
                                <p class="mb-0">${new Date(currentInternship.applicationDeadline).toLocaleDateString('th-TH')}</p>
                            </div>
                        </div>
                    </div>
                ` : ''}
                ${currentInternship.startDate ? `
                    <div class="col-md-3 mb-3">
                        <div class="card bg-info text-white h-100">
                            <div class="card-body">
                                <h6 class="fw-bold mb-2"><i class="bi bi-calendar-check me-2"></i>เริ่มฝึกงาน</h6>
                                <p class="mb-0">${new Date(currentInternship.startDate).toLocaleDateString('th-TH')}</p>
                            </div>
                        </div>
                    </div>
                ` : ''}
                ${currentInternship.applicantsCount !== undefined ? `
                    <div class="col-md-3 mb-3">
                        <div class="card bg-primary text-white h-100">
                            <div class="card-body">
                                <h6 class="fw-bold mb-2"><i class="bi bi-people me-2"></i>ผู้สมัคร</h6>
                                <h3 class="mb-0">${currentInternship.applicantsCount}</h3>
                            </div>
                        </div>
                    </div>
                ` : ''}
            </div>
        `;
        
        $('#internshipDetailContent').html(html);
    }
    
    function editInternship() {
        window.location.href = `admin-internship-edit.html?id=${currentInternship.internshipId}`;
    }
    </script>
</body>
</html>
