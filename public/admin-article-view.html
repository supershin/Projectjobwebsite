                    <div class="card shadow-sm">

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let currentArticle = null;
    $(document).ready(function() { loadArticleDetail(); });
    
    async function loadArticleDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');
        if (!articleId) { alert('ไม่พบ Article ID'); window.location.href = 'dashboard.html?mode=admin&view=articles'; return; }
        
        try {
            const response = await fetch('./data/insights.json');
            const articles = await response.json();
            currentArticle = articles.find(a => a.articleId === articleId);
            if (!currentArticle) { alert('ไม่พบข้อมูลบทความ'); window.location.href = 'dashboard.html?mode=admin&view=articles'; return; }
            displayArticleDetail();
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
        }
    }
    
    function displayArticleDetail() {
        const categoryClass = getCategoryClass(currentArticle.category);
        const html = `
            <div class="row mb-4">
                <div class="col-12">
                    <img src="${currentArticle.featuredImage}" alt="${currentArticle.title}" style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px;">
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-8">
                    <span class="badge ${categoryClass} mb-2">${currentArticle.category}</span>
                    <h2 class="fw-bold mb-3">${currentArticle.title}</h2>
                    <p class="lead text-muted">${currentArticle.excerpt}</p>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3">ข้อมูลบทความ</h6>
                            <p class="mb-2"><strong>Article ID:</strong><br><code>${currentArticle.articleId}</code></p>
                            <p class="mb-2"><strong>Read Time:</strong> ${currentArticle.readTime} min</p>
                            <p class="mb-0"><strong>Publish Date:</strong> ${formatDate(currentArticle.publishDate)}</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-white"><h6 class="fw-bold mb-0">ผู้เขียน</h6></div>
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3">
                        <img src="${currentArticle.author.avatar}" alt="${currentArticle.author.name}" style="width: 80px; height: 80px; border-radius: 50%;">
                        <div>
                            <h5 class="fw-bold mb-1">${currentArticle.author.name}</h5>
                            <p class="text-muted mb-1">${currentArticle.author.position}</p>
                            <p class="text-muted small mb-0">${currentArticle.author.bio}</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-white"><h6 class="fw-bold mb-0">เนื้อหาบทความ</h6></div>
                <div class="card-body">
                    <div style="font-size: 1.125rem; line-height: 1.8;">${currentArticle.content}</div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-white"><h6 class="fw-bold mb-0">Tags</h6></div>
                <div class="card-body">
                    ${currentArticle.tags.map(tag => `<span class="badge bg-secondary me-2 mb-2">${tag}</span>`).join('')}
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <div class="card bg-primary text-white h-100">
                        <div class="card-body"><h6 class="fw-bold mb-2"><i class="bi bi-eye me-2"></i>ยอดดู</h6><h3 class="mb-0">${formatNumber(currentArticle.views)}</h3></div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-danger text-white h-100">
                        <div class="card-body"><h6 class="fw-bold mb-2"><i class="bi bi-heart-fill me-2"></i>ถูกใจ</h6><h3 class="mb-0">${currentArticle.likes}</h3></div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-success text-white h-100">
                        <div class="card-body"><h6 class="fw-bold mb-2"><i class="bi bi-chat me-2"></i>ความคิดเห็น</h6><h3 class="mb-0">${currentArticle.comments}</h3></div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-info text-white h-100">
                        <div class="card-body"><h6 class="fw-bold mb-2"><i class="bi bi-star-fill me-2"></i>Featured</h6><h3 class="mb-0">${currentArticle.featured ? 'Yes' : 'No'}</h3></div>
                    </div>
                </div>
            </div>
        `;
        $('#articleDetailContent').html(html);
    }
    
    function editArticle() {
        window.location.href = `admin-article-edit.html?id=${currentArticle.articleId}`;
    }
    
    function getCategoryClass(category) {
        switch(category) {
            case 'Career Advice': return 'bg-primary';
            case 'Industry Trends': return 'bg-success';
            case 'Leadership': return 'bg-purple';
            default: return 'bg-secondary';
        }
    }
    
    function formatDate(dateString) {
        const date = new Date(dateString);
        const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543}`;
    }
    
    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num;
    }
    </script>
