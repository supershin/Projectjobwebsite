<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดูรายละเอียดบทความ - Admin - JobCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
    
    <style>
        .article-content {
            font-size: 1.125rem;
            line-height: 1.8;
            color: var(--gray-700);
        }
        .article-content h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .article-content h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <a href="dashboard.html?mode=admin&view=articles" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>กลับ
            </a>
            <h3 class="mb-0 fw-bold"><i class="bi bi-newspaper me-2"></i>รายละเอียดบทความ</h3>
            <button class="btn btn-success" onclick="editArticle()">
                <i class="bi bi-pencil me-2"></i>แก้ไข
            </button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div id="articleDetailContent">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3">กำลังโหลดข้อมูล...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let currentArticle = null;
    
    $(document).ready(function() {
        loadArticleDetail();
    });
    
    async function loadArticleDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');
        
        if (!articleId) {
            alert('ไม่พบ Article ID');
            window.location.href = 'dashboard.html?mode=admin&view=articles';
            return;
        }
        
        try {
            const response = await fetch('./data/insights.json');
            const articles = await response.json();
            currentArticle = articles.find(a => a.articleId === articleId);
            
            if (!currentArticle) {
                alert('ไม่พบข้อมูลบทความ');
                window.location.href = 'dashboard.html?mode=admin&view=articles';
                return;
            }
            
            displayArticleDetail();
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
        }
    }
    
    function displayArticleDetail() {
        const categoryClass = getCategoryClass(currentArticle.category);
        
        const html = `
            <!-- Featured Image -->
            <div class="row mb-4">
                <div class="col-12">
                    <div style="position: relative;">
                        <img src="${currentArticle.featuredImage}" alt="${currentArticle.title}" 
                             style="width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px;">
                        ${currentArticle.featured ? '<span class="badge bg-warning position-absolute top-0 end-0 m-3" style="font-size: 1rem;"><i class="bi bi-star-fill me-2"></i>Featured Article</span>' : ''}
                    </div>
                </div>
            </div>

            <!-- Header -->
            <div class="row mb-4">
                <div class="col-md-8">
                    <span class="badge ${categoryClass} mb-2" style="font-size: 0.9rem;">${currentArticle.category}</span>
                    <h1 class="fw-bold mb-3">${currentArticle.title}</h1>
                    <p class="lead text-muted">${currentArticle.excerpt}</p>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3"><i class="bi bi-info-circle me-2"></i>ข้อมูลบทความ</h6>
                            <p class="mb-2"><strong>Article ID:</strong><br><code>${currentArticle.articleId}</code></p>
                            <p class="mb-2"><strong>Slug:</strong><br><code>${currentArticle.slug}</code></p>
                            <p class="mb-0"><strong>Read Time:</strong><br>${currentArticle.readTime} minutes</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Author -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h6 class="fw-bold mb-0"><i class="bi bi-person me-2"></i>ผู้เขียน</h6>
                </div>
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3">
                        <img src="${currentArticle.author.avatar}" alt="${currentArticle.author.name}" 
                             style="width: 80px; height: 80px; border-radius: 50%;">
                        <div>
                            <h5 class="fw-bold mb-1">${currentArticle.author.name}</h5>
                            <p class="text-muted mb-1">${currentArticle.author.position}</p>
                            <p class="text-muted small mb-0">${currentArticle.author.bio}</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h6 class="fw-bold mb-0"><i class="bi bi-file-text me-2"></i>เนื้อหาบทความ</h6>
                </div>
                <div class="card-body">
                    <div class="article-content">
                        ${currentArticle.content}
                    </div>
                </div>
            </div>

            <!-- Tags -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h6 class="fw-bold mb-0"><i class="bi bi-tags me-2"></i>Tags</h6>
                </div>
                <div class="card-body">
                    ${currentArticle.tags.map(tag => `<span class="badge bg-secondary me-2 mb-2" style="font-size: 0.9rem;">${tag}</span>`).join('')}
                </div>
            </div>

            <!-- Stats -->
            <div class="row">
                <div class="col-md-3 mb-3">
                    <div class="card bg-primary text-white h-100">
                        <div class="card-body">
                            <h6 class="fw-bold mb-2"><i class="bi bi-eye me-2"></i>ยอดดู</h6>
                            <h3 class="mb-0">${formatNumber(currentArticle.views)}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-danger text-white h-100">
                        <div class="card-body">
                            <h6 class="fw-bold mb-2"><i class="bi bi-heart-fill me-2"></i>ถูกใจ</h6>
                            <h3 class="mb-0">${currentArticle.likes}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-success text-white h-100">
                        <div class="card-body">
                            <h6 class="fw-bold mb-2"><i class="bi bi-chat me-2"></i>ความคิดเห็น</h6>
                            <h3 class="mb-0">${currentArticle.comments}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <div class="card bg-info text-white h-100">
                        <div class="card-body">
                            <h6 class="fw-bold mb-2"><i class="bi bi-calendar me-2"></i>เผยแพร่</h6>
                            <p class="mb-0 small">${formatDate(currentArticle.publishDate)}</p>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        $('#articleDetailContent').html(html);
    }
    
    function editArticle() {
        window.location.href = `admin-article-edit.html?id=${currentArticle.articleId}`;
    }
    
    function getCategoryClass(category) {
        switch(category) {
            case 'Career Advice': return 'bg-primary';
            case 'Industry Trends': return 'bg-success';
            case 'Leadership': return 'bg-purple';
            default: return 'bg-secondary';
        }
    }
    
    function formatDate(dateString) {
        const date = new Date(dateString);
        const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 
                       'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543}`;
    }
    
    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num;
    }
    </script>
</body>
</html>
