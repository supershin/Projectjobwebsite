<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - JobHub</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="./css/style.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="container-fluid">
        <div class="row min-vh-100">
            <!-- Left Side - Image -->
            <div class="col-lg-6 d-none d-lg-flex auth-image-side">
                <div class="w-100 h-100 d-flex align-items-center justify-content-center p-5">
                    <div class="text-white text-center">
                        <h1 class="display-3 fw-bold mb-4">เริ่มต้นการเดินทาง</h1>
                        <p class="lead mb-4">สร้างบัญชีและค้นพบโอกาสใหม่ๆ</p>
                        <div class="d-flex gap-3 justify-content-center">
                            <span class="badge badge-custom">⚡ ลงทะเบียนฟรี</span>
                            <span class="badge badge-custom">🚀 เริ่มทันที</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side - Register Form -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center p-4">
                <div class="auth-form-container">
                    <div class="text-center mb-4">
                        <a href="index.html" class="text-decoration-none">
                            <h2 class="fw-bold text-primary">
                                <i class="bi bi-briefcase-fill"></i> JobHub
                            </h2>
                        </a>
                    </div>

                    <h3 class="fw-bold mb-2">สมัครสมาชิก</h3>
                    <p class="text-muted mb-4">สร้างบัญชีของคุณเพื่อเริ่มต้น</p>

                    <!-- User Type Selection -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">ประเภทบัญชี</label>
                        <div class="btn-group w-100" role="group" id="userTypeGroup">
                            <input type="radio" class="btn-check" name="userType" id="typeUser" value="user" checked>
                            <label class="btn btn-outline-primary" for="typeUser">
                                <i class="bi bi-person"></i> ผู้หางาน
                            </label>

                            <input type="radio" class="btn-check" name="userType" id="typeEmployer" value="employer">
                            <label class="btn btn-outline-primary" for="typeEmployer">
                                <i class="bi bi-building"></i> นายจ้าง
                            </label>
                        </div>
                    </div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">ชื่อ-นามสกุล</label>
                            <input type="text" class="form-control form-control-lg" id="name" placeholder="ชื่อของคุณ" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">อีเมล</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="example@email.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">เบอร์โทรศัพท์</label>
                            <input type="tel" class="form-control form-control-lg" id="phone" placeholder="08x-xxx-xxxx">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">รหัสผ่าน</label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <small class="text-muted">รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร</small>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">ยืนยันรหัสผ่าน</label>
                            <input type="password" class="form-control form-control-lg" id="confirmPassword" placeholder="••••••••" required>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="acceptTerms" required>
                            <label class="form-check-label" for="acceptTerms">
                                ฉันยอมรับ <a href="#">เงื่อนไขการใช้งาน</a> และ <a href="#">นโยบายความเป็นส่วนตัว</a>
                            </label>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary-custom btn-lg">
                                สมัครสมาชิก
                            </button>
                        </div>
                    </form>

                    <div class="divider my-4">
                        <span>หรือ</span>
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button class="btn btn-outline-dark btn-lg" type="button">
                            <i class="bi bi-google"></i> สมัครด้วย Google
                        </button>
                        <button class="btn btn-outline-primary btn-lg" type="button">
                            <i class="bi bi-facebook"></i> สมัครด้วย Facebook
                        </button>
                    </div>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-0">มีบัญชีอยู่แล้ว? <a href="login.html" class="fw-bold">เข้าสู่ระบบ</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="./js/main.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
