<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มบทความใหม่ - Admin - JobCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <a href="dashboard.html?mode=admin&view=articles" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>กลับ
            </a>
            <h3 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2"></i>เพิ่มบทความใหม่</h3>
            <div style="width: 100px;"></div>
        </div>

        <form id="addArticleForm">
            <!-- Basic Info -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-info-circle me-2"></i>ข้อมูลพื้นฐาน</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Article ID <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="articleId" required placeholder="article013">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Slug <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="slug" required placeholder="article-title-slug">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="title" required placeholder="หัวข้อบทความ...">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Excerpt <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="excerpt" rows="2" required placeholder="สรุปบทความสั้นๆ..."></textarea>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
                            <select class="form-select" name="category" required>
                                <option value="">-- เลือกหมวดหมู่ --</option>
                                <option value="Career Advice">Career Advice</option>
                                <option value="Industry Trends">Industry Trends</option>
                                <option value="Leadership">Leadership</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Read Time (minutes) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" name="readTime" required value="5">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Publish Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="publishDate" required>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Images -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-image me-2"></i>รูปภาพ</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Featured Image URL <span class="text-danger">*</span></label>
                            <input type="url" class="form-control" name="featuredImage" required placeholder="https://...">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Thumbnail URL</label>
                            <input type="url" class="form-control" name="thumbnail" placeholder="https://...">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-file-text me-2"></i>เนื้อหาบทความ</h6>
                </div>
                <div class="card-body">
                    <label class="form-label fw-semibold">Content (HTML) <span class="text-danger">*</span></label>
                    <textarea class="form-control" name="content" rows="15" required placeholder="<h2>หัวข้อ</h2><p>เนื้อหา...</p>"></textarea>
                    <small class="text-muted">รองรับ HTML tags</small>
                </div>
            </div>

            <!-- Author -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-person me-2"></i>ผู้เขียน</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">ชื่อผู้เขียน <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="authorName" required placeholder="สมชาย ใจดี">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">ตำแหน่ง <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="authorPosition" required placeholder="Hotel Manager">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Avatar URL <span class="text-danger">*</span></label>
                            <input type="url" class="form-control" name="authorAvatar" required placeholder="https://...">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Bio</label>
                            <textarea class="form-control" name="authorBio" rows="2" placeholder="ประวัติผู้เขียนสั้นๆ..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tags -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-tags me-2"></i>Tags</h6>
                </div>
                <div class="card-body">
                    <label class="form-label fw-semibold">Tags (คั่นด้วย comma)</label>
                    <input type="text" class="form-control" name="tags" placeholder="Career Development, Hotel Industry, Skills">
                    <small class="text-muted">ใส่หลาย tags คั่นด้วย comma</small>
                </div>
            </div>

            <!-- Settings -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-gear me-2"></i>การตั้งค่า</h6>
                </div>
                <div class="card-body">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" name="featured" id="featuredCheck">
                        <label class="form-check-label fw-semibold" for="featuredCheck">
                            <i class="bi bi-star-fill text-warning me-1"></i>Featured Article
                        </label>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Views</label>
                            <input type="number" class="form-control" name="views" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Likes</label>
                            <input type="number" class="form-control" name="likes" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Comments</label>
                            <input type="number" class="form-control" name="comments" value="0">
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 mb-4">
                <button type="submit" class="btn btn-primary btn-lg px-5">
                    <i class="bi bi-check-circle me-2"></i>บันทึกบทความ
                </button>
                <a href="dashboard.html?mode=admin&view=articles" class="btn btn-outline-secondary btn-lg px-5">ยกเลิก</a>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    $('#addArticleForm').on('submit', function(e) {
        e.preventDefault();
        
        const formData = {
            articleId: $('[name="articleId"]').val(),
            slug: $('[name="slug"]').val(),
            title: $('[name="title"]').val(),
            excerpt: $('[name="excerpt"]').val(),
            content: $('[name="content"]').val(),
            category: $('[name="category"]').val(),
            featuredImage: $('[name="featuredImage"]').val(),
            thumbnail: $('[name="thumbnail"]').val() || null,
            readTime: parseInt($('[name="readTime"]').val()),
            publishDate: $('[name="publishDate"]').val(),
            author: {
                name: $('[name="authorName"]').val(),
                position: $('[name="authorPosition"]').val(),
                avatar: $('[name="authorAvatar"]').val(),
                bio: $('[name="authorBio"]').val() || ''
            },
            tags: $('[name="tags"]').val() ? $('[name="tags"]').val().split(',').map(t => t.trim()) : [],
            featured: $('[name="featured"]').is(':checked'),
            views: parseInt($('[name="views"]').val()) || 0,
            likes: parseInt($('[name="likes"]').val()) || 0,
            comments: parseInt($('[name="comments"]').val()) || 0
        };
        
        console.log('New Article Data:', formData);
        alert('✅ บันทึกบทความใหม่สำเร็จ!\n\n(ในการใช้งานจริงจะส่งข้อมูลไป Backend API)');
        window.location.href = 'dashboard.html?mode=admin&view=articles';
    });
    </script>
</body>
</html>
