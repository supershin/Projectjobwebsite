<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดูรายละเอียดสถาบัน - Admin - JobCrew</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="d-flex align-items-center justify-content-between mb-4 pt-4">
                    <div>
                        <a href="dashboard.html?mode=admin&view=schools" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>กลับ
                        </a>
                    </div>
                    <h3 class="mb-0 fw-bold">
                        <i class="bi bi-mortarboard me-2"></i>
                        รายละเอียดสถาบันการศึกษา
                    </h3>
                    <div>
                        <button class="btn btn-success" onclick="editSchool()">
                            <i class="bi bi-pencil me-2"></i>แก้ไข
                        </button>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <div id="schoolDetailContent">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                                <p class="mt-3">กำลังโหลดข้อมูล...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
    let currentSchool = null;
    
    $(document).ready(function() {
        loadSchoolDetail();
    });
    
    async function loadSchoolDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const schoolId = urlParams.get('id');
        
        if (!schoolId) {
            alert('ไม่พบ School ID');
            window.location.href = 'dashboard.html?mode=admin&view=schools';
            return;
        }
        
        try {
            const response = await fetch('./data/hospitality-schools.json');
            const schools = await response.json();
            currentSchool = schools.find(s => s.schoolId === schoolId);
            
            if (!currentSchool) {
                alert('ไม่พบข้อมูลสถาบัน');
                window.location.href = 'dashboard.html?mode=admin&view=schools';
                return;
            }
            
            displaySchoolDetail();
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
        }
    }
    
    function displaySchoolDetail() {
        const html = `
            <!-- Cover & Logo -->
            <div class="row mb-4">
                <div class="col-12">
                    <div style="height: 250px; border-radius: 12px; overflow: hidden; position: relative; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <img src="${currentSchool.coverImage}" alt="Cover" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8;">
                        <div style="position: absolute; bottom: 30px; left: 30px; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);">
                            <img src="${currentSchool.logo}" alt="${currentSchool.shortName}" style="width: 100px; height: 100px; object-fit: contain;">
                        </div>
                        ${currentSchool.verified ? '<span class="badge bg-success position-absolute top-0 end-0 m-3" style="font-size: 1rem;"><i class="bi bi-patch-check-fill me-2"></i>Verified</span>' : ''}
                        ${currentSchool.featured ? '<span class="badge bg-primary position-absolute" style="top: 50px; right: 12px; font-size: 1rem;"><i class="bi bi-star-fill me-2"></i>Featured</span>' : ''}
                    </div>
                </div>
            </div>

            <!-- Basic Info -->
            <div class="row mb-4">
                <div class="col-md-8">
                    <h2 class="fw-bold mb-2">${currentSchool.schoolName}</h2>
                    <h5 class="text-muted mb-3">${currentSchool.shortName}</h5>
                    <p class="lead">${currentSchool.description}</p>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3"><i class="bi bi-info-circle me-2"></i>ข้อมูลพื้นฐาน</h6>
                            <p class="mb-2"><strong>School ID:</strong><br><code>${currentSchool.schoolId}</code></p>
                            <p class="mb-2"><strong>Type:</strong><br><span class="badge bg-primary">${currentSchool.type}</span></p>
                            <p class="mb-0"><strong>Location:</strong><br><i class="bi bi-geo-alt-fill text-primary me-1"></i>${currentSchool.location}</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Address & Contact -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h6 class="fw-bold mb-0"><i class="bi bi-geo-alt me-2"></i>ที่อยู่และการติดต่อ</h6>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p class="mb-2"><strong>Address:</strong></p>
                            <p>${currentSchool.address}</p>
                        </div>
                        <div class="col-md-6">
                            <p class="mb-2"><strong>Contact:</strong></p>
                            <p class="mb-1"><i class="bi bi-globe me-2"></i><a href="${currentSchool.website}" target="_blank">${currentSchool.website}</a></p>
                            <p class="mb-1"><i class="bi bi-envelope me-2"></i><a href="mailto:${currentSchool.contactEmail}">${currentSchool.contactEmail}</a></p>
                            <p class="mb-0"><i class="bi bi-telephone me-2"></i>${currentSchool.contactPhone}</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Programs -->
            <div class="card mb-4">
                <div class="card-header bg-white">
                    <h6 class="fw-bold mb-0"><i class="bi bi-book me-2"></i>หลักสูตร (${currentSchool.programs.length})</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        ${currentSchool.programs.map(prog => `
                            <div class="col-md-6">
                                <div class="card h-100">
                                    <div class="card-body">
                                        <span class="badge bg-primary mb-2">${prog.degree}</span>
                                        <h6 class="fw-bold">${prog.name}</h6>
                                        <p class="text-muted small mb-0">
                                            <i class="bi bi-clock me-1"></i>${prog.duration}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>

            ${currentSchool.accreditations && currentSchool.accreditations.length > 0 ? `
                <div class="card mb-4">
                    <div class="card-header bg-white">
                        <h6 class="fw-bold mb-0"><i class="bi bi-award me-2"></i>การรับรอง</h6>
                    </div>
                    <div class="card-body">
                        ${currentSchool.accreditations.map(acc => `
                            <span class="badge bg-success me-2 mb-2" style="font-size: 0.9rem;">${acc}</span>
                        `).join('')}
                    </div>
                </div>
            ` : ''}

            ${currentSchool.partnerships && currentSchool.partnerships.length > 0 ? `
                <div class="card mb-4">
                    <div class="card-header bg-white">
                        <h6 class="fw-bold mb-0"><i class="bi bi-handshake me-2"></i>พันธมิตร (${currentSchool.partnerships.length})</h6>
                    </div>
                    <div class="card-body">
                        ${currentSchool.partnerships.map(partner => `
                            <span class="badge bg-info me-2 mb-2" style="font-size: 0.9rem;">${partner}</span>
                        `).join('')}
                    </div>
                </div>
            ` : ''}

            <!-- Additional Info -->
            <div class="row">
                ${currentSchool.jobPlacementRate ? `
                    <div class="col-md-6 mb-3">
                        <div class="card bg-success text-white h-100">
                            <div class="card-body">
                                <h6 class="fw-bold mb-2"><i class="bi bi-graph-up me-2"></i>Job Placement Rate</h6>
                                <h3 class="mb-0">${currentSchool.jobPlacementRate}</h3>
                            </div>
                        </div>
                    </div>
                ` : ''}
                ${currentSchool.tuitionFee ? `
                    <div class="col-md-6 mb-3">
                        <div class="card bg-info text-white h-100">
                            <div class="card-body">
                                <h6 class="fw-bold mb-2"><i class="bi bi-credit-card me-2"></i>ค่าเล่าเรียน</h6>
                                <p class="mb-0">${currentSchool.tuitionFee}</p>
                            </div>
                        </div>
                    </div>
                ` : ''}
            </div>
        `;
        
        $('#schoolDetailContent').html(html);
    }
    
    function editSchool() {
        window.location.href = `admin-school-edit.html?id=${currentSchool.schoolId}`;
    }
    </script>
</body>
</html>
