</head>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">

                        <a class="nav-link dropdown-toggle" href="#" id="languageDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">

    <div class="dashboard-container">
        <div class="container-fluid">
            <div class="row">
                <!-- Sidebar -->
                <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                    <div class="position-sticky pt-3">
                        <ul class="nav flex-column">
                            <li class="nav-item"><a class="nav-link" href="dashboard.html?mode=admin&view=overview"><i class="bi bi-speedometer2"></i> ภาพรวม</a></li>
                            <li class="nav-item"><a class="nav-link" href="dashboard.html?mode=admin&view=users"><i class="bi bi-people"></i> จัดการผู้ใช้</a></li>
                            <li class="nav-item"><a class="nav-link" href="dashboard.html?mode=admin&view=jobs"><i class="bi bi-briefcase"></i> จัดการงาน</a></li>
                            <li class="nav-item"><a class="nav-link active" href="dashboard.html?mode=admin&view=hotels"><i class="bi bi-building-fill-add"></i> จัดการโรงแรม</a></li>
                            <li class="nav-item"><a class="nav-link" href="dashboard.html?mode=admin&view=schools"><i class="bi bi-mortarboard-fill"></i> จัดการสถาบัน</a></li>
                            <li class="nav-item"><a class="nav-link" href="dashboard.html?mode=admin&view=internships"><i class="bi bi-briefcase"></i> จัดการฝึกงาน</a></li>
                            <li class="nav-item"><a class="nav-link" href="dashboard.html?mode=admin&view=articles"><i class="bi bi-newspaper"></i> จัดการบทความ</a></li>
                        </ul>
                    </div>
                </nav>

                <!-- Main Content -->
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                    <div class="d-flex align-items-center justify-content-between mb-4 pt-4">
                        <a href="dashboard.html?mode=admin&view=hotels" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>กลับ</a>
                        <h3 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2"></i>เพิ่มโรงแรมใหม่</h3>
                        <div style="width: 100px;"></div>
                    </div>

                    <form id="addHotelForm">
                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-white"><h6 class="mb-0 fw-bold">ข้อมูลพื้นฐาน</h6></div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label fw-semibold">Hotel ID *</label><input type="text" class="form-control" name="hotelId" required></div>
                                    <div class="col-md-6"><label class="form-label fw-semibold">Hotel Name *</label><input type="text" class="form-control" name="hotelName" required></div>
                                    <div class="col-12"><label class="form-label fw-semibold">Description *</label><textarea class="form-control" name="description" rows="3" required></textarea></div>
                                    <div class="col-md-4"><label class="form-label fw-semibold">Category *</label>
                                        <select class="form-select" name="category" required>
                                            <option value="">-- เลือก --</option>
                                            <option value="Luxury Resort">Luxury Resort</option>
                                            <option value="Business Hotel">Business Hotel</option>
                                            <option value="Beach Resort">Beach Resort</option>
                                            <option value="City Hotel">City Hotel</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4"><label class="form-label fw-semibold">Location *</label>
                                        <select class="form-select" name="location" required>
                                            <option value="">-- เลือก --</option>
                                            <option value="Bangkok">Bangkok</option>
                                            <option value="Phuket">Phuket</option>
                                            <option value="Chiang Mai">Chiang Mai</option>
                                            <option value="Pattaya">Pattaya</option>
                                            <option value="Samui">Samui</option>
                                            <option value="Hua Hin">Hua Hin</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4"><label class="form-label fw-semibold">Rating</label><input type="number" class="form-control" name="rating" min="0" max="5" step="0.1"></div>
                                </div>
                            </div>
                        </div>

                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-white"><h6 class="mb-0 fw-bold">รูปภาพ</h6></div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label fw-semibold">Logo URL *</label><input type="url" class="form-control" name="logo" required></div>
                                    <div class="col-md-6"><label class="form-label fw-semibold">Hero Image URL *</label><input type="url" class="form-control" name="heroImage" required></div>
                                </div>
                            </div>
                        </div>

                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-white"><h6 class="mb-0 fw-bold">การติดต่อ</h6></div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-12"><label class="form-label fw-semibold">Address *</label><textarea class="form-control" name="address" rows="2" required></textarea></div>
                                    <div class="col-md-4"><label class="form-label fw-semibold">Website *</label><input type="url" class="form-control" name="website" required></div>
                                    <div class="col-md-4"><label class="form-label fw-semibold">Email *</label><input type="email" class="form-control" name="contactEmail" required></div>
                                    <div class="col-md-4"><label class="form-label fw-semibold">Phone *</label><input type="tel" class="form-control" name="contactPhone" required></div>
                                </div>
                            </div>
                        </div>

                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-white"><h6 class="mb-0 fw-bold">สถานะ</h6></div>
                            <div class="card-body">
                                <div class="form-check form-switch mb-2">
                                    <input class="form-check-input" type="checkbox" name="verified" id="verifiedCheck">
                                    <label class="form-check-label" for="verifiedCheck">Verified</label>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" name="featured" id="featuredCheck">
                                    <label class="form-check-label" for="featuredCheck">Featured</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mb-4">
                            <button type="submit" class="btn btn-primary btn-lg px-5"><i class="bi bi-check-circle me-2"></i>บันทึก</button>
                            <a href="dashboard.html?mode=admin&view=hotels" class="btn btn-outline-secondary btn-lg px-5">ยกเลิก</a>
                        </div>
                    </form>
                </main>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    $('#addHotelForm').on('submit', function(e) {
        e.preventDefault();
        const formData = {
            hotelId: $('[name="hotelId"]').val(),
            hotelName: $('[name="hotelName"]').val(),
            description: $('[name="description"]').val(),
            category: $('[name="category"]').val(),
            location: $('[name="location"]').val(),
            rating: parseFloat($('[name="rating"]').val()) || 0,
            logo: $('[name="logo"]').val(),
            heroImage: $('[name="heroImage"]').val(),
            address: $('[name="address"]').val(),
            website: $('[name="website"]').val(),
            contactEmail: $('[name="contactEmail"]').val(),
            contactPhone: $('[name="contactPhone"]').val(),
            verified: $('[name="verified"]').is(':checked'),
            featured: $('[name="featured"]').is(':checked')
        };
        console.log('New Hotel:', formData);
        alert('✅ บันทึกสำเร็จ!');
        window.location.href = 'dashboard.html?mode=admin&view=hotels';
    });
    </script>
    <script src="./js/translations.js"></script>
    <script src="./js/translations-extended.js"></script>
    <script src="./js/language.js"></script>
    <script src="./js/auth-state.js"></script>
</body>
</html>
