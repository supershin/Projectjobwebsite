<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขบทความ - Admin - JobCrew</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <a href="dashboard.html?mode=admin&view=articles" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>กลับ
            </a>
            <h3 class="mb-0 fw-bold"><i class="bi bi-pencil me-2"></i>แก้ไขบทความ</h3>
            <div style="width: 100px;"></div>
        </div>

        <div id="loadingContainer" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3">กำลังโหลดข้อมูล...</p>
        </div>

        <form id="editArticleForm" style="display: none;">
            <input type="hidden" name="articleId">
            
            <!-- Basic Info -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-info-circle me-2"></i>ข้อมูลพื้นฐาน</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Article ID</label>
                            <input type="text" class="form-control" name="articleIdDisplay" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Slug <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="slug" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="title" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Excerpt <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="excerpt" rows="2" required></textarea>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
                            <select class="form-select" name="category" required>
                                <option value="">-- เลือกหมวดหมู่ --</option>
                                <option value="Career Advice">Career Advice</option>
                                <option value="Industry Trends">Industry Trends</option>
                                <option value="Leadership">Leadership</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Read Time (minutes) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" name="readTime" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Publish Date <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="publishDate" required>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Images -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-image me-2"></i>รูปภาพ</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Featured Image URL <span class="text-danger">*</span></label>
                            <input type="url" class="form-control" name="featuredImage" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Thumbnail URL</label>
                            <input type="url" class="form-control" name="thumbnail">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-file-text me-2"></i>เนื้อหาบทความ</h6>
                </div>
                <div class="card-body">
                    <label class="form-label fw-semibold">Content (HTML) <span class="text-danger">*</span></label>
                    <textarea class="form-control" name="content" rows="15" required></textarea>
                    <small class="text-muted">รองรับ HTML tags</small>
                </div>
            </div>

            <!-- Author -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-person me-2"></i>ผู้เขียน</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">ชื่อผู้เขียน <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="authorName" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">ตำแหน่ง <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="authorPosition" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Avatar URL <span class="text-danger">*</span></label>
                            <input type="url" class="form-control" name="authorAvatar" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Bio</label>
                            <textarea class="form-control" name="authorBio" rows="2"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tags -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-tags me-2"></i>Tags</h6>
                </div>
                <div class="card-body">
                    <label class="form-label fw-semibold">Tags (คั่นด้วย comma)</label>
                    <input type="text" class="form-control" name="tags">
                    <small class="text-muted">ใส่หลาย tags คั่นด้วย comma</small>
                </div>
            </div>

            <!-- Settings -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-bold"><i class="bi bi-gear me-2"></i>การตั้งค่า</h6>
                </div>
                <div class="card-body">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" name="featured" id="featuredCheck">
                        <label class="form-check-label fw-semibold" for="featuredCheck">
                            <i class="bi bi-star-fill text-warning me-1"></i>Featured Article
                        </label>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Views</label>
                            <input type="number" class="form-control" name="views">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Likes</label>
                            <input type="number" class="form-control" name="likes">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Comments</label>
                            <input type="number" class="form-control" name="comments">
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 mb-4">
                <button type="submit" class="btn btn-success btn-lg px-5">
                    <i class="bi bi-check-circle me-2"></i>บันทึกการแก้ไข
                </button>
                <a href="dashboard.html?mode=admin&view=articles" class="btn btn-outline-secondary btn-lg px-5">ยกเลิก</a>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let currentArticle = null;
    
    $(document).ready(function() {
        loadArticleData();
    });
    
    async function loadArticleData() {
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');
        
        if (!articleId) {
            alert('ไม่พบ Article ID');
            window.location.href = 'dashboard.html?mode=admin&view=articles';
            return;
        }
        
        try {
            const response = await fetch('./data/insights.json');
            const articles = await response.json();
            currentArticle = articles.find(a => a.articleId === articleId);
            
            if (!currentArticle) {
                alert('ไม่พบข้อมูลบทความ');
                window.location.href = 'dashboard.html?mode=admin&view=articles';
                return;
            }
            
            populateForm();
            $('#loadingContainer').hide();
            $('#editArticleForm').show();
        } catch (error) {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
        }
    }
    
    function populateForm() {
        $('[name="articleId"]').val(currentArticle.articleId);
        $('[name="articleIdDisplay"]').val(currentArticle.articleId);
        $('[name="slug"]').val(currentArticle.slug);
        $('[name="title"]').val(currentArticle.title);
        $('[name="excerpt"]').val(currentArticle.excerpt);
        $('[name="content"]').val(currentArticle.content);
        $('[name="category"]').val(currentArticle.category);
        $('[name="featuredImage"]').val(currentArticle.featuredImage);
        $('[name="thumbnail"]').val(currentArticle.thumbnail || '');
        $('[name="readTime"]').val(currentArticle.readTime);
        
        if (currentArticle.publishDate) {
            $('[name="publishDate"]').val(currentArticle.publishDate.split('T')[0]);
        }
        
        $('[name="authorName"]').val(currentArticle.author.name);
        $('[name="authorPosition"]').val(currentArticle.author.position);
        $('[name="authorAvatar"]').val(currentArticle.author.avatar);
        $('[name="authorBio"]').val(currentArticle.author.bio || '');
        
        if (currentArticle.tags) {
            $('[name="tags"]').val(currentArticle.tags.join(', '));
        }
        
        $('[name="featured"]').prop('checked', currentArticle.featured);
        $('[name="views"]').val(currentArticle.views || 0);
        $('[name="likes"]').val(currentArticle.likes || 0);
        $('[name="comments"]').val(currentArticle.comments || 0);
    }
    
    $('#editArticleForm').on('submit', function(e) {
        e.preventDefault();
        
        const updatedData = {
            articleId: $('[name="articleId"]').val(),
            slug: $('[name="slug"]').val(),
            title: $('[name="title"]').val(),
            excerpt: $('[name="excerpt"]').val(),
            content: $('[name="content"]').val(),
            category: $('[name="category"]').val(),
            featuredImage: $('[name="featuredImage"]').val(),
            thumbnail: $('[name="thumbnail"]').val() || null,
            readTime: parseInt($('[name="readTime"]').val()),
            publishDate: $('[name="publishDate"]').val(),
            author: {
                name: $('[name="authorName"]').val(),
                position: $('[name="authorPosition"]').val(),
                avatar: $('[name="authorAvatar"]').val(),
                bio: $('[name="authorBio"]').val() || ''
            },
            tags: $('[name="tags"]').val() ? $('[name="tags"]').val().split(',').map(t => t.trim()) : [],
            featured: $('[name="featured"]').is(':checked'),
            views: parseInt($('[name="views"]').val()) || 0,
            likes: parseInt($('[name="likes"]').val()) || 0,
            comments: parseInt($('[name="comments"]').val()) || 0
        };
        
        console.log('Updated Article Data:', updatedData);
        alert('✅ บันทึกการแก้ไขสำเร็จ!\n\n(ในการใช้งานจริงจะส่งข้อมูลไป Backend API)');
        window.location.href = 'dashboard.html?mode=admin&view=articles';
    });
    </script>
</body>
</html>
